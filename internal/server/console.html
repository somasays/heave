<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>heave · control plane</title>
<style>
  :root{
    --ink:#0B0E13;--panel:#12171F;--panel2:#171D27;--raise:#1E2632;--line:#232C3A;--line2:#2E3A4B;
    --text:#E8EDF4;--muted:#93A0B4;--faint:#5F6C7E;--accent:#4FD1C5;--accent-dim:#2C8C84;
    --ok:#49C26B;--warn:#E0A62E;--crit:#F26D6D;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;--sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--ink);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums}
  a{color:var(--accent)}
  button{font-family:inherit;cursor:pointer}
  input,select{font-family:inherit;background:var(--ink);border:1px solid var(--line2);border-radius:7px;padding:8px 10px;color:var(--text);font-size:13px;width:100%}
  input:focus,select:focus{outline:none;border-color:var(--accent-dim)}
  .glyph{width:24px;height:24px;border-radius:6px;position:relative;background:linear-gradient(150deg,#12171F,#0B0E13);border:1px solid var(--line2);display:inline-block;vertical-align:middle}
  .glyph::before{content:"";position:absolute;inset:5px 5px auto 5px;height:2px;border-radius:2px;background:var(--accent)}
  .glyph::after{content:"";position:absolute;inset:auto 5px 5px 5px;height:7px;border-radius:2px;background:linear-gradient(90deg,var(--accent) 62%,var(--crit) 62%)}
  .word{font-weight:700;letter-spacing:-.02em}.word b{color:var(--accent)}
  .btn{background:var(--raise);border:1px solid var(--line2);color:var(--text);border-radius:8px;padding:8px 13px;font-size:13px;font-weight:550}
  .btn:hover{border-color:var(--accent-dim)}
  .btn.primary{background:var(--accent);color:#06201D;border:none;font-weight:700}
  .btn.danger{color:var(--crit);border-color:#6d2f31}
  .btn.sm{padding:5px 10px;font-size:12px}

  /* login */
  #login{max-width:400px;margin:9vh auto;padding:0 20px}
  #login .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:30px 28px}
  #login h1{font-size:19px;margin:14px 0 4px}#login .sub{color:var(--muted);font-size:13px;margin-bottom:20px}
  .sso{display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
  .divider{display:flex;align-items:center;gap:10px;color:var(--faint);font-size:11px;font-family:var(--mono);margin:14px 0}
  .divider::before,.divider::after{content:"";height:1px;background:var(--line2);flex:1}
  .field{margin-bottom:11px}.field label{font-size:11.5px;color:var(--muted);display:block;margin-bottom:5px}
  .err{color:var(--crit);font-size:12.5px;min-height:18px;margin-top:6px}

  /* app */
  header{display:flex;align-items:center;gap:14px;padding:11px 18px;border-bottom:1px solid var(--line);background:var(--panel2)}
  header .sp{flex:1}
  .pill{font-family:var(--mono);font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--line2);color:var(--muted)}
  .pill.ok{color:var(--ok);border-color:#2e5b3c}
  .who{font-size:12.5px;color:var(--muted)}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border-bottom:1px solid var(--line)}
  .kpi{background:var(--panel);padding:13px 16px}.kpi .k{font-size:11px;color:var(--muted)}.kpi .v{font-family:var(--mono);font-size:21px;margin-top:4px}
  .kpi .v.crit{color:var(--crit)}.kpi .v.warn{color:var(--warn)}
  .cols{display:grid;grid-template-columns:280px 1fr;min-height:70vh}
  .tree{border-right:1px solid var(--line);padding:12px 10px}
  .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);padding:6px 8px;display:flex;justify-content:space-between;align-items:center}
  .node{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;cursor:pointer;color:var(--muted);font-size:13px}
  .node:hover{background:var(--panel2)}.node.sel{background:var(--raise);color:var(--text)}
  .node.t1{margin-left:14px}.node.t2{margin-left:28px;font-size:12.5px}
  .node .amt{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint)}
  .tick{width:6px;height:6px;border-radius:50%;background:var(--ok);flex:0 0 6px}.tick.crit{background:var(--crit)}
  .node.killed{text-decoration:line-through;color:var(--faint)}
  .detail{padding:18px 22px}
  .detail h2{font-size:18px;margin:0 0 2px}.path{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-bottom:18px}
  .badge{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:5px;border:1px solid var(--line2);color:var(--muted);margin-left:8px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
  .bcard{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:13px 14px}
  .bcard .k{font-size:11.5px;color:var(--muted);margin-bottom:6px}.bcard .amt{font-family:var(--mono);font-size:17px}
  .sect{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin:22px 0 10px;display:flex;align-items:center;gap:10px}
  .sect::after{content:"";height:1px;background:var(--line);flex:1}
  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
  .warn{border:1px solid #5a4a1e;background:rgba(224,166,46,.07);color:#e9c877;border-radius:9px;padding:9px 12px;font-size:12.5px;margin-bottom:14px}
  .form{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px}
  .form .row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
  .toast{position:fixed;bottom:18px;right:18px;background:var(--raise);border:1px solid var(--line2);border-radius:9px;padding:10px 14px;font-size:13px;max-width:340px;opacity:0;transition:opacity .2s}
  .toast.show{opacity:1}.toast.bad{border-color:#6d2f31;color:var(--crit)}
  .hidden{display:none!important}
  @media(max-width:720px){.cols{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}.tree{border-right:none;border-bottom:1px solid var(--line)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="hidden">
  <div style="display:flex;align-items:center;gap:9px;margin-bottom:16px"><span class="glyph"></span><span class="word" style="font-size:17px">he<b>a</b>ve</span><span class="pill">control plane</span></div>
  <div class="card">
    <h1>Sign in</h1>
    <div class="sub">Access the org spend control plane.</div>
    <div class="sso" id="ssoBtns"></div>
    <div class="divider" id="ssoDivider">OR</div>
    <form id="localForm">
      <div class="field"><label>Username</label><input id="u" autocomplete="username"></div>
      <div class="field"><label>Password</label><input id="p" type="password" autocomplete="current-password"></div>
      <button class="btn primary" style="width:100%;justify-content:center" type="submit">Sign in</button>
      <div class="err" id="loginErr"></div>
    </form>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header>
    <span class="glyph"></span><span class="word" style="font-size:16px">he<b>a</b>ve</span>
    <span class="pill ok">● enforcing · pre-vendor</span>
    <span class="sp"></span>
    <span class="who" id="who"></span>
    <button class="btn sm" id="logout">Log out</button>
  </header>
  <div class="kpis" id="kpis"></div>
  <div class="cols">
    <div class="tree">
      <div class="lbl">Hierarchy <button class="btn sm" id="addOrg">+ org</button></div>
      <div id="treeBox"></div>
    </div>
    <div class="detail" id="detail"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
const $ = s => document.querySelector(s);
let STATE = {nodes:[], over:[], sel:null};

function toast(msg, bad){const t=$("#toast");t.textContent=msg;t.className="toast show"+(bad?" bad":"");setTimeout(()=>t.className="toast",2600);}
async function api(method, path, body){
  const opt={method, headers:{}, credentials:"same-origin"};
  if(body!==undefined){opt.headers["Content-Type"]="application/json";opt.body=JSON.stringify(body);}
  const r=await fetch(path, opt);
  if(r.status===401){show("login");throw new Error("unauthorized");}
  const txt=await r.text();
  let data=null; try{data=txt?JSON.parse(txt):null;}catch(e){}
  if(!r.ok) throw new Error((data&&data.error&&data.error.message)||("HTTP "+r.status));
  return data;
}
function show(view){$("#login").classList.toggle("hidden",view!=="login");$("#app").classList.toggle("hidden",view!=="app");}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function fmtLimits(l){const p=[];if(l.max_usd_per_day)p.push("$"+l.max_usd_per_day+"/d");if(l.max_usd_per_min)p.push("$"+l.max_usd_per_min+"/m");if(l.max_concurrent)p.push(l.max_concurrent+" conc");if(l.max_usd_per_run)p.push("$"+l.max_usd_per_run+"/run");return p.join(" · ")||"—";}

// ---- boot ----
async function boot(){
  let info; try{info=await fetch("/console/info",{credentials:"same-origin"}).then(r=>r.json());}catch(e){info={providers:[],authenticated:false};}
  const sso=$("#ssoBtns"); sso.innerHTML="";
  (info.providers||[]).forEach(p=>{
    const a=document.createElement("a"); a.href="/console/auth/"+p+"/start"; a.className="btn"; a.style.textAlign="center";
    a.textContent="Continue with "+p.charAt(0).toUpperCase()+p.slice(1); sso.appendChild(a);
  });
  $("#ssoDivider").classList.toggle("hidden",!(info.providers||[]).length);
  if(info.authenticated){$("#who").textContent=info.name||"admin";show("app");load();}
  else show("login");
}
$("#localForm").addEventListener("submit", async e=>{
  e.preventDefault(); $("#loginErr").textContent="";
  try{ await api("POST","/console/login",{username:$("#u").value,password:$("#p").value}); boot(); }
  catch(err){ $("#loginErr").textContent="Invalid credentials or not authorized."; }
});
$("#logout").addEventListener("click", async()=>{try{await api("POST","/console/logout");}catch(e){}show("login");});
$("#addOrg").addEventListener("click",()=>{STATE.sel={_new:"org"};render();});

// ---- load + render ----
async function load(){
  const d=await api("GET","/v1/policy"); STATE.nodes=d.nodes||[]; STATE.over=d.over_allocations||[];
  if(STATE.sel&&!STATE.sel._new){STATE.sel=STATE.nodes.find(n=>n.type===STATE.sel.type&&n.id===STATE.sel.id)||null;}
  if(!STATE.sel&&STATE.nodes.length)STATE.sel=STATE.nodes[0];
  render();
}
function key(n){return n.type+":"+n.id;}
function render(){
  const orgs=STATE.nodes.filter(n=>n.type==="org"), teams=STATE.nodes.filter(n=>n.type==="team"), apps=STATE.nodes.filter(n=>n.type==="app");
  $("#kpis").innerHTML=[
    ["Nodes",STATE.nodes.length,""],["Teams",teams.length,""],
    ["Apps",apps.length,""],["Killed",STATE.nodes.filter(n=>n.killed).length,"crit"]
  ].map(([k,v,c])=>`<div class="kpi"><div class="k">${k}</div><div class="v ${c}">${v}</div></div>`).join("");

  // tree
  let t="";
  orgs.forEach(o=>{
    t+=nodeRow(o,0);
    teams.filter(x=>x.parent_id===o.id).forEach(tm=>{
      t+=nodeRow(tm,1);
      apps.filter(a=>a.parent_id===tm.id).forEach(a=>t+=nodeRow(a,2));
    });
  });
  $("#treeBox").innerHTML=t||`<div style="color:var(--faint);padding:10px 8px;font-size:13px">No orgs yet — add one.</div>`;
  document.querySelectorAll("#treeBox .node").forEach(el=>el.addEventListener("click",()=>{
    STATE.sel=STATE.nodes.find(n=>key(n)===el.dataset.k); render();
  }));
  renderDetail();
}
function nodeRow(n,depth){
  const sel=STATE.sel&&!STATE.sel._new&&key(STATE.sel)===key(n)?" sel":"";
  const tick=n.killed?"tick crit":"tick";
  return `<div class="node t${depth}${sel}${n.killed?' killed':''}" data-k="${key(n)}"><span class="${tick}"></span>${esc(n.name||n.id)} <span class="amt">${n.type==='app'?'$'+(n.limits.max_usd_per_run||0):(n.limits.max_usd_per_day?'$'+n.limits.max_usd_per_day+'/d':'')}</span></div>`;
}
function renderDetail(){
  const d=$("#detail");
  if(STATE.sel&&STATE.sel._new){ d.innerHTML=createForm(STATE.sel._new); wireCreate(); return; }
  const n=STATE.sel;
  if(!n){d.innerHTML="";return;}
  const l=n.limits;
  const childType=n.type==="org"?"team":n.type==="team"?"app":null;
  let over=STATE.over.filter(w=>w.startsWith(key(n))).map(w=>`<div class="warn">⚠ ${esc(w)}</div>`).join("");
  d.innerHTML=`
    <h2>${esc(n.name||n.id)} <span class="badge">${n.type}</span> ${n.killed?'<span class="badge" style="color:var(--crit);border-color:#6d2f31">killed</span>':''}</h2>
    <div class="path">${key(n)}${n.parent_id?" · under "+esc(n.parent_id):""}</div>
    ${over}
    <div class="grid">
      <div class="bcard"><div class="k">Daily budget</div><div class="amt">${l.max_usd_per_day?"$"+l.max_usd_per_day:"—"}</div></div>
      <div class="bcard"><div class="k">Velocity</div><div class="amt">${l.max_usd_per_min?"$"+l.max_usd_per_min+"/min":"—"}</div></div>
      <div class="bcard"><div class="k">Concurrency</div><div class="amt">${l.max_concurrent||"—"}</div></div>
      <div class="bcard"><div class="k">Per-run ceiling</div><div class="amt">${l.max_usd_per_run?"$"+l.max_usd_per_run:"—"}</div></div>
    </div>
    <div class="actions">
      <button class="btn sm" id="editLimits">Edit budget</button>
      ${childType?`<button class="btn sm" id="addChild">+ ${childType}</button>`:""}
      <button class="btn sm" id="issueKey">Issue key</button>
      <button class="btn sm ${n.killed?'':'danger'}" id="killBtn">${n.killed?"Un-kill":"Kill "+n.type}</button>
    </div>
    <div id="inlineForm"></div>`;
  $("#editLimits").addEventListener("click",()=>showLimitsForm(n));
  if(childType)$("#addChild").addEventListener("click",()=>{STATE.sel={_new:childType,parent:n.id};render();});
  $("#issueKey").addEventListener("click",()=>showKeyForm(n));
  $("#killBtn").addEventListener("click",()=>killNode(n));
}

function limitInputs(l){l=l||{};return `
  <div class="row"><div class="field"><label>$/day</label><input id="f_day" value="${l.max_usd_per_day||''}"></div>
  <div class="field"><label>$/min</label><input id="f_min" value="${l.max_usd_per_min||''}"></div></div>
  <div class="row"><div class="field"><label>max concurrent</label><input id="f_conc" value="${l.max_concurrent||''}"></div>
  <div class="field"><label>$/run</label><input id="f_run" value="${l.max_usd_per_run||''}"></div></div>`;}
function readLimits(){return {max_usd_per_day:+($("#f_day").value||0),max_usd_per_min:+($("#f_min").value||0),max_concurrent:+($("#f_conc").value||0),max_usd_per_run:+($("#f_run").value||0)};}

function createForm(type){
  const parentField=type==="team"?`<div class="field"><label>Org id</label><input id="c_parent" value="${STATE.sel.parent||''}"></div>`
    :type==="app"?`<div class="field"><label>Team id</label><input id="c_parent" value="${STATE.sel.parent||''}"></div>`:"";
  return `<h2>New ${type}</h2><div class="path">create a ${type}</div>
    <div class="form">
      <div class="row"><div class="field"><label>id</label><input id="c_id"></div><div class="field"><label>name</label><input id="c_name"></div></div>
      ${parentField?'<div class="row">'+parentField+'<div></div></div>':""}
      ${limitInputs({})}
      <div class="actions"><button class="btn primary sm" id="createBtn">Create</button><button class="btn sm" id="cancelBtn">Cancel</button></div>
    </div>`;
}
function wireCreate(){
  $("#cancelBtn").addEventListener("click",()=>{STATE.sel=STATE.nodes[0]||null;render();});
  $("#createBtn").addEventListener("click",async()=>{
    const type=STATE.sel._new, body={id:$("#c_id").value,name:$("#c_name").value,limits:readLimits()};
    let path;
    if(type==="org")path="/v1/policy/orgs";
    else if(type==="team"){path="/v1/policy/teams";body.org_id=$("#c_parent").value;}
    else{path="/v1/policy/apps";body.team_id=$("#c_parent").value;}
    try{await api("POST",path,body);toast(type+" created");STATE.sel={type,id:body.id};load();}
    catch(e){toast(e.message,true);}
  });
}
function showLimitsForm(n){
  $("#inlineForm").innerHTML=`<div class="sect">Edit budget</div><div class="form">${limitInputs(n.limits)}
    <div class="actions"><button class="btn primary sm" id="saveLimits">Save</button></div></div>`;
  $("#saveLimits").addEventListener("click",async()=>{
    try{await api("PUT","/v1/policy/nodes/"+n.type+"/"+encodeURIComponent(n.id)+"/limits",readLimits());toast("budget updated");load();}
    catch(e){toast(e.message,true);}
  });
}
function showKeyForm(n){
  $("#inlineForm").innerHTML=`<div class="sect">Issue key → ${key(n)}</div><div class="form">
    <div class="field"><label>API key (raw bearer — hashed server-side)</label><input id="k_key" placeholder="sk-..."></div>
    <div class="actions"><button class="btn primary sm" id="saveKey">Issue</button></div></div>`;
  $("#saveKey").addEventListener("click",async()=>{
    try{const r=await api("POST","/v1/policy/keys",{key:$("#k_key").value,node_type:n.type,node_id:n.id});toast("key issued ("+(r.key_sha256||"").slice(0,12)+"…)");$("#inlineForm").innerHTML="";}
    catch(e){toast(e.message,true);}
  });
}
async function killNode(n){
  const verb=n.killed?"unkill":"kill";
  try{await api("POST","/v1/policy/nodes/"+n.type+"/"+encodeURIComponent(n.id)+"/"+verb);toast(n.type+" "+verb+"ed");load();}
  catch(e){toast(e.message,true);}
}

boot();
</script>
</body>
</html>
